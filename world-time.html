<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界时间 · World Clock</title>
<style>
  :root {
    --bg: #0f1226;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
    --text: #f3f5ff;
    --muted: #9aa3c7;
    --accent: #7c8cff;
    --day: #ffd66b;
    --night: #6b7cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 15% -10%, #2a2f6b 0%, transparent 55%),
                radial-gradient(1000px 700px at 110% 20%, #4a2a6b 0%, transparent 50%),
                var(--bg);
    background-attachment: fixed;
    padding: 48px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #fff, #b9c2ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
  }

  .local-time {
    margin-top: 18px;
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(8px);
  }
  .local-time .label { color: var(--muted); font-size: 13px; }
  .local-time .value { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 22px;
  }

  .clock-card {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .clock-card:hover {
    transform: translateY(-4px);
    border-color: rgba(124, 140, 255, 0.5);
    box-shadow: 0 18px 40px -18px rgba(124, 140, 255, 0.6);
  }

  .clock-card .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .city {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .city .flag { font-size: 26px; line-height: 1; }
  .city .names .name { font-size: 18px; font-weight: 600; }
  .city .names .country { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .daynight {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    border-radius: 50%;
    font-size: 18px;
    background: rgba(255, 255, 255, 0.08);
  }

  .time {
    font-size: 40px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    line-height: 1;
  }
  .time .seconds { font-size: 20px; color: var(--accent); font-weight: 600; }
  .time .ampm { font-size: 16px; color: var(--muted); margin-left: 6px; font-weight: 600; }

  .meta {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: var(--muted);
  }
  .meta .date { font-weight: 500; }
  .meta .tz {
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(124, 140, 255, 0.15);
    color: #c3cbff;
    font-variant-numeric: tabular-nums;
  }

  .offset-bar {
    position: absolute;
    left: 0; bottom: 0;
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, var(--night), var(--accent), var(--day));
    opacity: 0.7;
  }

  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
  <header>
    <h1>🌍 世界实时时间</h1>
    <p>World Clock · 每秒实时更新</p>
    <div class="local-time">
      <span class="label">您的本地时间</span>
      <span class="value" id="localTime">--:--:--</span>
    </div>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    时间根据您设备的系统时钟与各时区偏移实时计算 · 刷新页面即可同步
  </footer>

<script>
  const CITIES = [
    { name: "纽约",       country: "United States",  tz: "America/New_York",      flag: "🇺🇸" },
    { name: "洛杉矶",     country: "United States",  tz: "America/Los_Angeles",   flag: "🇺🇸" },
    { name: "伦敦",       country: "United Kingdom", tz: "Europe/London",         flag: "🇬🇧" },
    { name: "巴黎",       country: "France",         tz: "Europe/Paris",          flag: "🇫🇷" },
    { name: "莫斯科",     country: "Russia",         tz: "Europe/Moscow",         flag: "🇷🇺" },
    { name: "迪拜",       country: "UAE",            tz: "Asia/Dubai",            flag: "🇦🇪" },
    { name: "北京",       country: "China",          tz: "Asia/Shanghai",         flag: "🇨🇳" },
    { name: "东京",       country: "Japan",          tz: "Asia/Tokyo",            flag: "🇯🇵" },
    { name: "新加坡",     country: "Singapore",      tz: "Asia/Singapore",        flag: "🇸🇬" },
    { name: "悉尼",       country: "Australia",      tz: "Australia/Sydney",      flag: "🇦🇺" },
    { name: "圣保罗",     country: "Brazil",         tz: "America/Sao_Paulo",     flag: "🇧🇷" },
    { name: "孟买",       country: "India",          tz: "Asia/Kolkata",          flag: "🇮🇳" },
  ];

  const grid = document.getElementById("grid");

  // Build cards once
  CITIES.forEach((c, i) => {
    const card = document.createElement("article");
    card.className = "clock-card";
    card.innerHTML = `
      <div class="top-row">
        <div class="city">
          <span class="flag">${c.flag}</span>
          <div class="names">
            <div class="name">${c.name}</div>
            <div class="country">${c.country}</div>
          </div>
        </div>
        <div class="daynight" data-icon></div>
      </div>
      <div class="time" data-time></div>
      <div class="meta">
        <span class="date" data-date></span>
        <span class="tz" data-tz></span>
      </div>
      <div class="offset-bar"></div>
    `;
    grid.appendChild(card);
    c._el = {
      time: card.querySelector("[data-time]"),
      date: card.querySelector("[data-date]"),
      tz:   card.querySelector("[data-tz]"),
      icon: card.querySelector("[data-icon]"),
    };
  });

  function tzAbbreviation(date, tz) {
    try {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: tz, timeZoneName: "short", hour: "numeric"
      }).formatToParts(date);
      const p = parts.find(p => p.type === "timeZoneName");
      return p ? p.value : tz;
    } catch (e) { return tz; }
  }

  function utcOffset(date, tz) {
    // Difference (minutes) between the tz wall-clock and UTC
    const local = new Date(date.toLocaleString("en-US", { timeZone: tz }));
    const utc   = new Date(date.toLocaleString("en-US", { timeZone: "UTC" }));
    const mins  = Math.round((local - utc) / 60000);
    const sign  = mins >= 0 ? "+" : "-";
    const a     = Math.abs(mins);
    const hh    = String(Math.floor(a / 60)).padStart(2, "0");
    const mm    = String(a % 60).padStart(2, "0");
    return `UTC${sign}${hh}:${mm}`;
  }

  function update() {
    const now = new Date();

    document.getElementById("localTime").textContent =
      now.toLocaleTimeString("zh-CN", { hour12: false });

    CITIES.forEach(c => {
      const timeParts = new Intl.DateTimeFormat("en-US", {
        timeZone: c.tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      }).formatToParts(now);
      const get = t => (timeParts.find(p => p.type === t) || {}).value || "00";
      const hh = get("hour"), mm = get("minute"), ss = get("second");

      c._el.time.innerHTML =
        `${hh}:${mm}<span class="seconds">:${ss}</span>`;

      c._el.date.textContent = new Intl.DateTimeFormat("zh-CN", {
        timeZone: c.tz, weekday: "short", month: "long", day: "numeric"
      }).format(now);

      c._el.tz.textContent = `${tzAbbreviation(now, c.tz)} · ${utcOffset(now, c.tz)}`;

      const hour = parseInt(hh, 10);
      const isDay = hour >= 6 && hour < 18;
      c._el.icon.textContent = isDay ? "☀️" : "🌙";
    });
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
